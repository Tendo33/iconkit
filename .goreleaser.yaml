version: 2

project_name: iconkit

before:
  hooks:
    - go mod tidy

builds:
  - id: iconkit
    main: .
    binary: iconkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Tendo33/iconkit/cmd.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: iconkit
    repository:
      owner: Tendo33
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    binaries:
      - iconkit
    homepage: "https://github.com/Tendo33/iconkit"
    description: "Developer-friendly CLI tool for icon processing - resize and round corners in one command"
    license: "MIT"
    url:
      verified: github.com/Tendo33/iconkit
    caveats: |
      iconkit is currently distributed as an unsigned binary.
      If macOS blocks the executable, run:
        xattr -dr com.apple.quarantine "$(brew --prefix)/Caskroom/iconkit/latest/iconkit"

release:
  github:
    owner: Tendo33
    name: iconkit
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
