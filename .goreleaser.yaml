version: 2

project_name: iconkit

before:
  hooks:
    - go mod tidy

builds:
  - id: iconkit
    main: .
    binary: iconkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Tendo33/iconkit/cmd.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: Tendo33
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/Tendo33/iconkit"
    description: "Developer-friendly CLI tool for icon processing — resize & round corners in one command"
    license: "MIT"
    install: |
      bin.install "iconkit"
    test: |
      system "#{bin}/iconkit", "--help"

release:
  github:
    owner: Tendo33
    name: iconkit
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
