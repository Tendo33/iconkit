version: 2

project_name: iconkit

before:
  hooks:
    - go mod tidy

builds:
  - id: iconkit
    main: .
    binary: iconkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Tendo33/iconkit/cmd.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Linux packages (deb, rpm, apk)
nfpms:
  - id: packages
    package_name: iconkit
    vendor: Tendo33
    homepage: https://github.com/Tendo33/iconkit
    maintainer: Tendo33 <tendo33@users.noreply.github.com>
    description: Developer-friendly CLI tool for icon processing — resize, round corners, add padding, fill backgrounds, and generate favicon.ico in one command.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    priority: optional

# Windows Scoop manifest
# Requires GORELEASER_GITHUB_TOKEN to have contents:write on Tendo33/scoop-bucket.
# To skip scoop publishing in a specific run, set SKIP_SCOOP=true in the workflow env.
scoops:
  - repository:
      owner: Tendo33
      name: scoop-bucket
      branch: main
    directory: bucket
    homepage: https://github.com/Tendo33/iconkit
    description: Developer-friendly CLI tool for icon processing.
    license: MIT

# macOS ad-hoc code signing (removes Gatekeeper unsigned binary warning without Apple Developer account)
signs:
  - artifacts: binary
    ids:
      - iconkit
    cmd: sh
    args:
      - "-c"
      - "command -v codesign >/dev/null 2>&1 && codesign --force --deep -s - '${artifact}' || true"
    signature: "${artifact}"

homebrew_casks:
  - name: iconkit
    repository:
      owner: Tendo33
      name: homebrew-tap
      branch: main
    directory: Casks
    binaries:
      - iconkit
    homepage: "https://github.com/Tendo33/iconkit"
    description: "Developer-friendly CLI tool for icon processing - resize and round corners in one command"
    license: "MIT"
    url:
      verified: github.com/Tendo33/iconkit
    caveats: |
      iconkit is currently distributed as an unsigned binary.
      If macOS blocks the executable, run:
        xattr -dr com.apple.quarantine "$(brew --prefix)/Caskroom/iconkit/latest/iconkit"

release:
  github:
    owner: Tendo33
    name: iconkit
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
