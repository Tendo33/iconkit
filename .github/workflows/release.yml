name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate release token
        env:
          GORELEASER_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
        run: |
          if [ -z "${GORELEASER_GITHUB_TOKEN}" ]; then
            echo "::error::Missing GORELEASER_GITHUB_TOKEN secret. Create a PAT that can write to Tendo33/iconkit and Tendo33/homebrew-tap."
            exit 1
          fi

          for repo in Tendo33/iconkit Tendo33/homebrew-tap Tendo33/scoop-bucket; do
            status="$(curl -sS -o /tmp/repo.json -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GORELEASER_GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}")"

            if [ "${status}" -ne 200 ]; then
              echo "::error::GORELEASER_GITHUB_TOKEN cannot access ${repo} (HTTP ${status})."
              echo "::error::Ensure the PAT has contents:write on iconkit, homebrew-tap, and scoop-bucket."
              cat /tmp/repo.json
              exit 1
            fi
          done

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
